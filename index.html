<body>

    <div id="menu" class="ui-overlay">

        <button class="btn" onclick="location.reload()">Вернуться в меню</button>
    </div>

    <script>
        const menu = document.getElementById('menu');
        const gameUI = document.getElementById('game-ui');
        const introContainer = document.getElementById('intro-video-container');
        const introVideo = document.getElementById('intro-video');
        const bgmMenu = document.getElementById('bgm-menu');
        const bgmGame = document.getElementById('bgm-game');
        
        const dialogueText = document.getElementById('dialogue-text');
        const optionsContainer = document.getElementById('options');
        const portrait = document.getElementById('guest-portrait');
        const homeStatus = document.getElementById('home-status');
        const dayDisplay = document.getElementById('day-num');

        let currentDay = 1;
        let isHomeOccupied = false;
        let gameState = 'dialogue';

        // Инициализация при клике (нужно для автоплея звука)
        window.addEventListener('mousedown', () => {
            if (bgmMenu.paused && gameUI.classList.contains('hidden')) {
                bgmMenu.play().catch(e => console.log("Audio play blocked"));
            }
        }, { once: true });

        function startIntro() {
            menu.classList.add('hidden');
            introContainer.style.display = 'block';
            bgmMenu.pause();
            introVideo.play();

            introVideo.onended = () => {
                introContainer.style.display = 'none';
                startGame();
            };
        }

        function startGame() {
            gameUI.classList.remove('hidden');
            document.getElementById('terminal').style.display = 'flex';
            bgmGame.play();
            spawnGuest();
        }

        function showDeath(reason) {
            gameUI.classList.add('hidden');
            const ds = document.getElementById('death-screen');
            ds.classList.remove('hidden');
            document.getElementById('death-reason').innerText = reason;
            bgmGame.pause();
        }

        // Логика гостей
        const GUESTS = [
            {
                id: 'human_1',
                name: 'Бродяга',
                isMonster: false,
                baseImg: 'Gemini_Generated_Image_hs6fgkhs6fgkhs6f.png',
                handsImg: 'Gemini_Generated_Image_hej1oihej1oihej1.png',
                hatImg: 'Gemini_Generated_Image_dcsp14dcsp14dcsp.png',
                dialogue: '"Привет, впусти пожалуйста, мне нужно спастись, я много дней брожу..."',
                responses: {
                    base: [
                        { text: "Заходи", action: "accept" },
                        { text: "Покажи руки", action: "checkHands" },
                        { text: "Сними шапку", action: "checkHat" }
                    ],
                    checked: [
                        { text: "Впустить", action: "accept" },
                        { text: "Прогнать", action: "reject" }
                    ]
                }
            },
            {
                id: 'bread_1',
                name: 'Странный тип',
                isMonster: true,
                baseImg: 'Gemini_Generated_Image_hs6fgkhs6fgkhs6f.png', // Прикидывается тем же челом
                handsImg: 'https://via.placeholder.com/300x400/222/fff?text=Claws+Detected', // Здесь должны быть когти
                hatImg: 'https://via.placeholder.com/300x400/111/fff?text=Black+Eyes', // Здесь черные глаза
                dialogue: '"Эй, приятель... Открой дверь. У меня есть... хлеб. Я нормальный. Видишь, я курю!"',
                responses: {
                    base: [
                        { text: "Заходи", action: "accept" },
                        { text: "Покажи руки", action: "checkHands" },
                        { text: "Сними шапку", action: "checkHat" }
                    ],
                    checked: [
                        { text: "Впустить", action: "accept" },
                        { text: "Прогнать", action: "reject" }
                    ]
                }
            }
        ];

        let currentGuest = null;

        function spawnGuest() {
            // Если вторая ночь (четная), проверяем Излома
            if (currentDay % 2 === 0) {
                checkIzlom();
                return;
            }

            // Рандомный гость (человек или замаскированный монстр)
            currentGuest = GUESTS[Math.floor(Math.random() * GUESTS.length)];
            updateDialogue(currentGuest.dialogue, currentGuest.responses.base, currentGuest.baseImg);
        }

        function updateDialogue(text, options, img) {
            dialogueText.innerText = text;
            portrait.style.backgroundImage = `url('${img}')`;
            optionsContainer.innerHTML = '';
            
            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = opt.text;
                b.onclick = () => handleAction(opt.action);
                optionsContainer.appendChild(b);
            });
        }

        function handleAction(action) {
            if (action === 'accept') {
                if (currentGuest.isMonster) {
                    showDeath("Вы впустили хлебного монстра. Он разорвал вас, пока вы спали.");
                } else {
                    isHomeOccupied = true;
                    homeStatus.innerText = "Гость в доме";
                    homeStatus.className = "text-blue-500";
                    nextDay();
                }
            } else if (action === 'reject') {
                isHomeOccupied = false;
                homeStatus.innerText = "Один";
                homeStatus.className = "text-green-500";
                nextDay();
            } else if (action === 'checkHands') {
                updateDialogue("Ну что доволен? Или еще что-то показать?", currentGuest.responses.checked, currentGuest.handsImg);
            } else if (action === 'checkHat') {
                updateDialogue("Ну что доволен? Или еще что-то показать?", currentGuest.responses.checked, currentGuest.hatImg);
            }
        }

        function nextDay() {
            currentDay++;
            dayDisplay.innerText = currentDay;
            setTimeout(spawnGuest, 1000);
        }

        function checkIzlom() {
            dialogueText.innerText = "Наступила вторая ночь... Вы слышите тяжелые шаги Излома у двери...";
            portrait.style.backgroundImage = "none";
            optionsContainer.innerHTML = '<span class="text-red-500 animate-pulse">ОЖИДАНИЕ...</span>';

            setTimeout(() => {
                if (isHomeOccupied) {
                    dialogueText.innerText = "Излом учуял запах другого человека в доме. Он решил, что здесь слишком людно, и ушел искать одинокую добычу...";
                    isHomeOccupied = false; // Гость уходит утром
                    homeStatus.innerText = "Один";
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = "Дожить до утра";
                    b.onclick = nextDay;
                    optionsContainer.innerHTML = '';
                    optionsContainer.appendChild(b);
                } else {
                    showDeath("Излом ворвался в пустой дом. Ему не помешал никто, чтобы съесть хозяина.");
                }
            }, 3000);
        }

    </script>
</body>
</html>
