<body>

    </div>

    <!-- Игровой экран -->
    <div id="game-ui" class="ui-overlay hidden">
        <div class="stat-panel">
            <div class="text-xs text-gray-500 uppercase">Ночь</div>
            <div class="text-4xl font-bold text-white mb-2" id="day-num">1</div>
            <div class="text-xs text-gray-500 uppercase">В доме:</div>
            <div id="home-status" class="text-green-600 font-bold">ПУСТО</div>

    <!-- Экран смерти -->
    <div id="death-screen" class="ui-overlay hidden death-bg">

            <h1 class="text-8xl font-black mb-4 text-red-700">ТЫ МЕРТВ</h1>
            <p id="death-reason" class="text-2xl mb-12 text-white"></p>
            <button class="btn bg-red-950 text-white px-10 py-4" onclick="location.reload()">В МЕНЮ</button>
        </div>
    </div>

    <script>
        const menu = document.getElementById('menu');
        const gameUI = document.getElementById('game-ui');
        const introContainer = document.getElementById('intro-video-container');
        const introVideo = document.getElementById('intro-video');
        const bgmMenu = document.getElementById('bgm-menu');
        const bgmGame = document.getElementById('bgm-game');
        
        const dialogueText = document.getElementById('dialogue-text');
        const optionsContainer = document.getElementById('options');
        const portrait = document.getElementById('guest-portrait');
        const homeStatus = document.getElementById('home-status');
        const dayDisplay = document.getElementById('day-num');
        const deathScreen = document.getElementById('death-screen');

        let currentDay = 1;
        let isHomeOccupied = false;
        let guestQueue = [];
        let currentGuest = null;

        window.addEventListener('mousedown', () => {
            if (bgmMenu.paused && gameUI.classList.contains('hidden')) {
                bgmMenu.play().catch(() => {});
            }
        }, { once: true });

        function startIntro() {
            menu.classList.add('hidden');
            introContainer.style.display = 'block';
            bgmMenu.pause();
            introVideo.play();
            introVideo.onended = startGame;
        }

        function startGame() {
            introContainer.style.display = 'none';
            gameUI.classList.remove('hidden');
            document.getElementById('terminal').style.display = 'flex';
            bgmGame.play();
            initQueue();
            spawnGuest();
        }

        function showDeath(reason, image) {
            gameUI.classList.add('hidden');
            deathScreen.classList.remove('hidden');
            deathScreen.style.backgroundImage = `url('${image}')`;
            document.getElementById('death-reason').innerText = reason;
            bgmGame.pause();
        }

        // Список только тех гостей, у которых есть картинки
        const GUESTS_DB = [
            {
                id: 'human_1',
                isMonster: false,
                imgBase: 'Gemini_Generated_Image_hs6fgkhs6fgkhs6f.png',
                imgHands: 'Gemini_Generated_Image_hej1oihej1oihej1.png',
                imgHat: 'Gemini_Generated_Image_dcsp14dcsp14dcsp.png',
                text: '"Привет, впусти пожалуйста, мне нужно спастись, я много дней брожу..."',
                checks: ['hands', 'hat']
            },
            {
                id: 'monster_glasses',
                isMonster: true,
                imgBase: 'Gemini_Generated_Image_zhviwwzhviwwzhvi.png',
                imgAlt: 'Gemini_Generated_Image_s1a9fts1a9fts1a9.png', // Демон-глаза
                imgDeath: 'Gemini_Generated_Image_pz6kztpz6kztpz6k.png',
                text: '"Пусти погреться. Глаза? Да так, инфекция какая-то, на свет больно смотреть..."',
                checks: ['glasses']
            },
            {
                id: 'human_3cxn',
                isMonster: false,
                imgBase: 'Gemini_Generated_Image_3cxn4q3cxn4q3cxn.png',
                text: '"Я чист! Проверь меня, я просто хочу выжить в этом кошмаре."',
                checks: []
            },
            {
                id: 'human_old_glasses',
                isMonster: false,
                imgBase: 'Gemini_Generated_Image_mkjfs1mkjfs1mkjf.png',
                imgAlt: 'Gemini_Generated_Image_rhvnubrhvnubrhvn.png', // Снял очки
                text: '"Добрый вечер. Старику найдется место у огня? Могу снять очки, если боишься."',
                checks: ['glasses']
            },
            {
                id: 'monster_demon_girl',
                isMonster: true,
                imgBase: 'Gemini_Generated_Image_lx43k1lx43k1lx43.png',
                imgDeath: 'Gemini_Generated_Image_64bz6k64bz6k64bz.png',
                text: '"Дяденька, мне очень страшно... Я потеряла маму. Можно мне зайти?"',
                checks: []
            },
            {
                id: 'monster_granny_1',
                isMonster: true,
                imgBase: '1776636123150.png',
                imgDeath: '1776636217836.png',
                text: '"Ой, сынок... Тяжело мне. Впусти бабушку, я тебе хлебушка принесла свежего..."',
                checks: []
            },
            {
                id: 'monster_granny_2',
                isMonster: true,
                imgBase: '1776636302683.png',
                imgDeath: '1776636708526.png',
                text: '"Здравствуй. Я твоя соседка... Ну, почти. Впустишь передохнуть?"',
                checks: []
            },
            {
                id: 'monster_creep',
                isMonster: true,
                imgBase: '1776636495908.png',
                imgDeath: '1776636852517.png',
                text: '"Хе-хе... Ну что, хозяин, гостям рад? Я свой, просто видок такой... помятый."',
                checks: []
            },
            {
                id: 'human_young',
                isMonster: false,
                imgBase: '1776636988431.png',
                text: '"Чувак, я нормальный! Слышишь? У меня даже хлеба с собой нет, я его ненавижу!"',
                checks: []
            },
            {
                id: 'human_soldier',
                isMonster: false,
                imgBase: '1776637322788.png',
                text: '"Военный патруль... Точнее, то что от него осталось. Нужно укрытие на ночь."',
                checks: []
            },
            {
                id: 'human_fat',
                isMonster: false,
                imgBase: '1776637562012.png',
                text: '"Уф... Дай дух перевести. Едва ушел от одного такого... длинного. Пустишь?"',
                checks: []
            }
        ];

        function initQueue() {
            guestQueue = [...GUESTS_DB].sort(() => Math.random() - 0.5);
        }

        function spawnGuest() {
            if (currentDay % 2 === 0) {
                checkIzlom();
                return;
            }

            if (guestQueue.length === 0) initQueue();
            currentGuest = guestQueue.pop();
            
            showStep(currentGuest.text, currentGuest.imgBase, getOptionsForGuest(currentGuest));
        }

        function getOptionsForGuest(guest) {
            let opts = [{ text: "Заходи", action: "accept" }];
            
            if (guest.checks.includes('hands')) opts.push({ text: "Покажи руки", action: "checkHands" });
            if (guest.checks.includes('hat')) opts.push({ text: "Сними шапку", action: "checkHat" });
            if (guest.checks.includes('glasses')) opts.push({ text: "Сними очки", action: "checkGlasses" });
            
            opts.push({ text: "Прогнать", action: "reject" });
            return opts;
        }

        function showStep(text, img, options) {
            dialogueText.innerText = text;
            portrait.style.backgroundImage = `url('${img}')`;
            optionsContainer.innerHTML = '';
            
            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = opt.text;
                b.onclick = () => handleAction(opt.action);
                optionsContainer.appendChild(b);
            });
        }

        function handleAction(action) {
            if (action === 'accept') {
                if (currentGuest.isMonster) {
                    showDeath("Вы впустили монстра. Как только вы отвернулись, он вонзил когти в вашу спину.", currentGuest.imgDeath);
                } else {
                    isHomeOccupied = true;
                    homeStatus.innerText = "ГОСТЬ ВНУТРИ";
                    homeStatus.className = "text-blue-500 font-bold";
                    nextDay();
                }
            } else if (action === 'reject') {
                isHomeOccupied = false;
                homeStatus.innerText = "ПУСТО";
                homeStatus.className = "text-green-600 font-bold";
                nextDay();
            } else if (action === 'checkHands') {
                showStep("Ну что доволен? Или ещё что-то показать?", currentGuest.imgHands, [
                    { text: "Впустить", action: "accept" },
                    { text: "Прогнать", action: "reject" }
                ]);
            } else if (action === 'checkHat') {
                showStep("Ну что доволен? Или ещё что-то показать?", currentGuest.imgHat, [
                    { text: "Впустить", action: "accept" },
                    { text: "Прогнать", action: "reject" }
                ]);
            } else if (action === 'checkGlasses') {
                showStep("Ну... снял. Теперь ты видишь мои глаза. Доволен?", currentGuest.imgAlt, [
                    { text: "Впустить", action: "accept" },
                    { text: "Прогнать", action: "reject" }
                ]);
            }
        }

        function nextDay() {
            currentDay++;
            dayDisplay.innerText = currentDay;
            setTimeout(spawnGuest, 800);
        }

        function checkIzlom() {
            dialogueText.innerText = "Наступила вторая ночь... Излом пришел проверить твой дом...";
            portrait.style.backgroundImage = "url('Gemini_Generated_Image_fge9kxfge9kxfge9.png')";
            optionsContainer.innerHTML = '<div class="text-red-600 font-black text-4xl animate-pulse">ИЗЛОМ СТУЧИТСЯ</div>';

            setTimeout(() => {
                if (isHomeOccupied) {
                    dialogueText.innerText = "Излом учуял другого человека. Он не любит толпу и ушел искать одинокого хозяина.";
                    isHomeOccupied = false;
                    homeStatus.innerText = "ПУСТО";
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = "Дожить до утра";
                    b.onclick = nextDay;
                    optionsContainer.innerHTML = '';
                    optionsContainer.appendChild(b);
                } else {
                    showDeath("Излом зашел в тихий дом. Тебя некому было защитить.", "1771547396165.png");
                }
            }, 3500);
        }
    </script>
</body>
</html>
