<body>

            <div class="mt-4 text-xs text-gray-500 uppercase tracking-widest">Безопасность</div>
            <div id="home-status" class="text-green-500 font-bold uppercase text-lg tracking-tighter">ОДИНОЧЕСТВО</div>
        </div>

        <div id="terminal" class="game-terminal">

    <!-- Смерть -->
    <div id="death-screen" class="ui-overlay hidden death-bg">
        <div class="bg-black bg-opacity-90 p-12 text-center border-b-8 border-red-700 shake">
            <h1 class="text-9xl font-black mb-6 text-red-700 uppercase italic">КОНЕЦ</h1>
            <p id="death-reason" class="text-3xl mb-12 text-white max-w-2xl font-bold"></p>
            <button class="btn bg-red-900 text-white px-20 py-6" onclick="location.reload()">Вернуться в начало</button>
        </div>
    </div>

    <script>
        const menu = document.getElementById('menu');
        const gameUI = document.getElementById('game-ui');
        const introContainer = document.getElementById('intro-video-container');
        const introVideo = document.getElementById('intro-video');
        const bgmMenu = document.getElementById('bgm-menu');
        const bgmGame = document.getElementById('bgm-game');
        
        const dialogueText = document.getElementById('dialogue-text');
        const optionsContainer = document.getElementById('options');
        const portrait = document.getElementById('guest-portrait');
        const homeStatus = document.getElementById('home-status');
        const dayDisplay = document.getElementById('day-num');
        const deathScreen = document.getElementById('death-screen');

        let currentDay = 1;
        let isHomeOccupied = false;
        let guestQueue = [];

        window.addEventListener('mousedown', () => {
            if (bgmMenu.paused && gameUI.classList.contains('hidden')) {
                bgmMenu.play().catch(() => {});
            }
        }, { once: true });

        function startIntro() {
            menu.classList.add('hidden');
            introContainer.style.display = 'block';
            bgmMenu.pause();
            introVideo.play();
            introVideo.onended = startGame;
        }

        function startGame() {
            introContainer.style.display = 'none';
            gameUI.classList.remove('hidden');
            document.getElementById('terminal').style.display = 'flex';
            bgmGame.play();
            resetQueue();
            spawnGuest();
        }

        function showDeath(reason, image) {
            gameUI.classList.add('hidden');
            deathScreen.classList.remove('hidden');
            deathScreen.style.backgroundImage = `url('${image}')`;
            document.getElementById('death-reason').innerText = reason;
            bgmGame.pause();
        }

        // База данных всех гостей
        const GUESTS = [
            {
                id: 'h1',
                isMonster: false,
                imgBase: 'Gemini_Generated_Image_hs6fgkhs6fgkhs6f.png',
                imgAlt: 'Gemini_Generated_Image_hej1oihej1oihej1.png',
                imgAlt2: 'Gemini_Generated_Image_dcsp14dcsp14dcsp.png',
                text: '"Привет, впусти пожалуйста, мне нужно спастись, я много дней брожу..."',
                type: 'hat_and_hands'
            },
            {
                id: 'm1',
                isMonster: true,
                imgBase: 'Gemini_Generated_Image_zhviwwzhviwwzhvi.png',
                imgAlt: 'Gemini_Generated_Image_s1a9fts1a9fts1a9.png',
                imgDeath: 'Gemini_Generated_Image_pz6kztpz6kztpz6k.png',
                text: '"Пусти погреться, дружище. Очки? Да так, конъюнктивит замучил..."',
                type: 'glasses'
            },
            {
                id: 'm2',
                isMonster: true,
                imgBase: '1776636123150.png',
                imgDeath: '1776636217836.png',
                text: '"Сынок, открой дверь... Я совсем замерзла на этой улице. У меня есть свежий батон..."',
                type: 'simple'
            },
            {
                id: 'm3_granny',
                isMonster: true,
                imgBase: '1776636302683.png',
                imgDeath: '1776636708526.png',
                text: '"Здравствуй, милый. Впусти бабушку, я принесла тебе гостинцев. Ты ведь любишь хлебушек?"',
                type: 'simple'
            },
            {
                id: 'm4_creep',
                isMonster: true,
                imgBase: '1776636495908.png',
                imgDeath: '1776636852517.png',
                text: '"Эй... Открой. Я знаю, ты там. Я просто хочу поговорить. И закурить. У тебя есть огонь?"',
                type: 'simple'
            },
            {
                id: 'h2_guy',
                isMonster: false,
                imgBase: '1776636988431.png',
                text: '"Чувак, там какая-то жесть творится. Впусти, я помогу забаррикадировать окна!"',
                type: 'simple'
            },
            {
                id: 'h3_soldier',
                isMonster: false,
                imgBase: '1776637322788.png',
                text: '"Спокойно, я свой. У меня патроны на исходе, нужно переждать ночь. С автоматом я надежнее любого засова."',
                type: 'simple'
            },
            {
                id: 'h4_fatman',
                isMonster: false,
                imgBase: '1776637562012.png',
                text: '"Ох... Едва добежал. Эти твари быстрые. Пустишь? Я много места не займу, честное слово."',
                type: 'simple'
            },
            {
                id: 'h5',
                isMonster: false,
                imgBase: 'Gemini_Generated_Image_3cxn4q3cxn4q3cxn.png',
                text: '"Я человек! Видишь? Никаких когтей, глаза нормальные. Пожалуйста!"',
                type: 'simple'
            },
            {
                id: 'h6',
                isMonster: false,
                imgBase: 'Gemini_Generated_Image_mkjfs1mkjfs1mkjf.png',
                imgAlt: 'Gemini_Generated_Image_rhvnubrhvnubrhvn.png',
                text: '"Старый я уже для этих пряток. Позволь войти, добрый человек."',
                type: 'glasses'
            },
            {
                id: 'm5_girl',
                isMonster: true,
                imgBase: 'Gemini_Generated_Image_lx43k1lx43k1lx43.png',
                imgDeath: 'Gemini_Generated_Image_64bz6k64bz6k64bz.png',
                text: '"Помогите... Мама осталась там... Мне страшно..."',
                type: 'simple'
            }
        ];

        function resetQueue() {
            guestQueue = [...GUESTS].sort(() => Math.random() - 0.5);
        }

        function spawnGuest() {
            if (currentDay % 2 === 0) {
                checkIzlom();
                return;
            }

            if (guestQueue.length === 0) resetQueue();
            currentGuest = guestQueue.pop();
            showDialogue(currentGuest.text, getBaseOptions(currentGuest), currentGuest.imgBase);
        }

        function getBaseOptions(guest) {
            let opts = [{ text: "Впустить", action: "accept" }];
            if (guest.type === 'hat_and_hands') {
                opts.push({ text: "Покажи руки", action: "checkHands" });
                opts.push({ text: "Сними шапку", action: "checkHat" });
            } else if (guest.type === 'glasses') {
                opts.push({ text: "Сними очки", action: "checkGlasses" });
            } else {
                opts.push({ text: "Проверить признаки", action: "inspect" });
            }
            opts.push({ text: "Прогнать", action: "reject" });
            return opts;
        }

        function showDialogue(text, options, img) {
            dialogueText.innerText = text;
            portrait.style.backgroundImage = `url('${img}')`;
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = opt.text;
                b.onclick = () => handleAction(opt.action);
                optionsContainer.appendChild(b);
            });
        }

        function handleAction(action) {
            if (action === 'accept') {
                if (currentGuest.isMonster) {
                    showDeath("Вы впустили монстра. В темноте он принял свою истинную форму и поглотил вас.", currentGuest.imgDeath);
                } else {
                    isHomeOccupied = true;
                    homeStatus.innerText = "ГОСТЬ В ДОМЕ";
                    homeStatus.className = "text-blue-400 font-bold";
                    nextDay();
                }
            } else if (action === 'reject') {
                isHomeOccupied = false;
                homeStatus.innerText = "ОДИНОЧЕСТВО";
                homeStatus.className = "text-green-500 font-bold";
                nextDay();
            } else if (action.startsWith('check')) {
                const img = (action === 'checkHat') ? currentGuest.imgAlt2 : (currentGuest.imgAlt || currentGuest.imgBase);
                showDialogue("Ну что, теперь веришь? Впускай давай!", [
                    { text: "Впустить", action: "accept" },
                    { text: "Все равно уходи", action: "reject" }
                ], img);
            } else if (action === 'inspect') {
                let report = "Признаков монстра не обнаружено на первый взгляд...";
                if (currentGuest.isMonster) report = "Вам кажется, что от него пахнет дрожжами, а кожа подозрительно бледная...";
                showDialogue(report, [
                    { text: "Впустить", action: "accept" },
                    { text: "Прогнать от греха подальше", action: "reject" }
                ], currentGuest.imgBase);
            }
        }

        function nextDay() {
            currentDay++;
            dayDisplay.innerText = currentDay;
            document.getElementById('terminal').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('terminal').style.opacity = '1';
                spawnGuest();
            }, 600);
        }

        function checkIzlom() {
            dialogueText.innerText = "...Скрип... Скрежет когтей по металлу... Излом пробует замок...";
            portrait.style.backgroundImage = "url('Gemini_Generated_Image_fge9kxfge9kxfge9.png')";
            optionsContainer.innerHTML = '<div class="text-red-700 animate-pulse font-black text-5xl tracking-widest">ИЗЛОМ У ДВЕРИ</div>';

            setTimeout(() => {
                if (isHomeOccupied) {
                    dialogueText.innerText = "Излом чувствует присутствие другого человека. Он не любит драться за еду и предпочитает уйти в поисках более легкой, одинокой цели.";
                    isHomeOccupied = false;
                    homeStatus.innerText = "ОДИНОЧЕСТВО";
                    const b = document.createElement('button');
                    b.className = 'btn border-green-700';
                    b.innerText = "Дожить до рассвета";
                    b.onclick = nextDay;
                    optionsContainer.innerHTML = '';
                    optionsContainer.appendChild(b);
                } else {
                    showDeath("Излом зашел в пустой дом. Никто не смог его остановить. Смерть была долгой.", "1771547396165.png");
                }
            }, 4500);
        }
    </script>
</body>
</html>
