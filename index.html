<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bread Hunger: Extended Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        .img-bg-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Gemini_Generated_Image_phkqpdphkqpdphkq.png');
            background-size: cover; background-position: center;
            z-index: -2;
        }
        .video-bg {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1; object-fit: cover;
            opacity: 0;
        }
        .ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0, 0, 0, 0.4);
        }
        .game-terminal {
            background: rgba(10, 10, 10, 0.98);
            border: 2px solid #333; padding: 30px;
            width: 95%; max-width: 1100px; min-height: 580px;
            display: none; flex-direction: column;
            box-shadow: 0 0 60px rgba(0,0,0,1);
            border-radius: 4px;
        }
        .btn {
            background: #0a0a0a; border: 1px solid #444;
            padding: 14px 28px; margin: 6px; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase;
            font-weight: bold; color: #999;
            font-size: 0.9rem;
        }
        .btn:hover {
            background: #1a1a1a; border-color: #ff0000; color: #fff;
            box-shadow: 0 0 15px rgba(255,0,0,0.2);
        }
        .portrait {
            width: 380px; height: 480px; border: 2px solid #222;
            background-size: cover; background-position: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        #intro-video-container {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000; z-index: 100;
        }
        
        .stat-panel {
            position: absolute; 
            top: 10px; 
            left: 10px;
            background: rgba(0,0,0,0.95); 
            padding: 8px 12px;
            border-left: 2px solid #cc0000; 
            z-index: 50;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            max-width: 180px;
        }
        .stat-panel .text-3xl { font-size: 1.5rem; line-height: 1.2; }

        .death-bg { background-size: cover; background-position: center; }
        .shake { animation: shake 0.4s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 1px); }
            20% { transform: translate(-3px, -2px); }
            40% { transform: translate(3px, 2px); }
            60% { transform: translate(-3px, 1px); }
            80% { transform: translate(3px, -1px); }
            100% { transform: translate(1px, -2px); }
        }

        #room-view {
            display: none;
            width: 100%;
            height: 100%;
            background-image: url('Gemini_Generated_Image_uraunkuraunkurau.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }
    </style>
</head>
<body>

    <audio id="bgm-menu" loop><source src="Сталкер 2 - музыка из игры - музыка из игры сталкер_(mp3find.ru).mp3" type="audio/mpeg"></audio>
    <audio id="bgm-game" loop><source src="analog_mannequin_-_Milk_Cassette_Xmp3_73690486.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-knock"><source src="door-knock-hollow-door_zjhxy34_.mp3" type="audio/mpeg"></audio>

    <div id="menu" class="ui-overlay">
        <div class="img-bg-menu"></div>
        <video class="video-bg" autoplay muted loop><source src="2_5240143908263991677.mp4" type="video/mp4"></video>
        <h1 class="text-8xl font-black mb-4 text-red-700 tracking-tighter italic uppercase text-center drop-shadow-2xl">BREAD HUNGER</h1>
        <p class="mb-14 text-gray-400 tracking-[0.3em] text-sm uppercase font-bold">монстр маскируется под гостей</p>
        <button class="btn text-4xl px-20 py-10 border-red-900 bg-black/80 hover:bg-red-900/20 transition-all" onclick="startIntro()">НАЧАТЬ</button>
    </div>

    <div id="intro-video-container">
        <video id="intro-video" class="w-full h-full object-cover"><source src="2_5240143908263991682.mp4" type="video/mp4"></video>
    </div>

    <div id="game-ui" class="hidden ui-overlay">
        <div class="stat-panel">
            <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-0">Фаза</div>
            <div class="text-3xl font-black text-white mb-1">НОЧЬ <span id="day-num">1</span></div>
            <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-0">Монеты</div>
            <div id="coin-count" class="text-yellow-500 font-bold text-xl mb-1">15</div>
            <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-0">Статус</div>
            <div id="home-status" class="text-green-600 font-bold text-base uppercase italic">ОДИНОЧЕСТВО</div>
        </div>

        <div id="room-view">
            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-4">
                <button class="btn" onclick="showMirror()">ЗЕРКАЛО</button>
                <button class="btn border-yellow-600" onclick="showShop()">МАГАЗИН</button>
                <button id="window-btn" class="btn" onclick="showWindow()">В ОКНО</button>
                <button id="eye-btn" class="btn hidden" onclick="goToTerminal()">ПОСМОТРЕТЬ В ГЛАЗОК</button>
            </div>
        </div>

        <div id="terminal" class="game-terminal">
            <div class="flex flex-col md:flex-row gap-10">
                <div id="guest-portrait" class="portrait flex-shrink-0"></div>
                <div class="flex flex-col justify-between py-4 w-full">
                    <div>
                        <div class="text-red-700 text-xs font-black uppercase mb-6 tracking-[0.4em] border-b border-red-900/30 pb-2">Сканирование цели</div>
                        <div id="dialogue-text" class="text-3xl leading-snug text-gray-100 font-medium"></div>
                    </div>
                    <div id="options" class="flex flex-wrap gap-3 mt-8"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="death-screen" class="hidden ui-overlay death-bg">
        <div class="bg-black/95 p-16 text-center border-y-8 border-red-700 shake w-full">
            <h1 class="text-9xl font-black mb-6 text-red-700 uppercase italic">ТЫ МЕРТВ</h1>
            <p id="death-reason" class="text-3xl mb-12 text-white max-w-4xl mx-auto leading-relaxed"></p>
            <button class="btn bg-red-900 text-white px-24 py-8 text-2xl hover:bg-red-700" onclick="location.reload()">ЗАНОВО</button>
        </div>
    </div>

    <script>
        const menu = document.getElementById('menu');
        const gameUI = document.getElementById('game-ui');
        const roomView = document.getElementById('room-view');
        const terminal = document.getElementById('terminal');
        const introContainer = document.getElementById('intro-video-container');
        const introVideo = document.getElementById('intro-video');
        const bgmMenu = document.getElementById('bgm-menu');
        const bgmGame = document.getElementById('bgm-game');
        const sfxKnock = document.getElementById('sfx-knock');
        const dialogueText = document.getElementById('dialogue-text');
        const optionsContainer = document.getElementById('options');
        const portrait = document.getElementById('guest-portrait');
        const homeStatus = document.getElementById('home-status');
        const dayDisplay = document.getElementById('day-num');
        const coinDisplay = document.getElementById('coin-count');
        const deathScreen = document.getElementById('death-screen');
        const eyeBtn = document.getElementById('eye-btn');
        const windowBtn = document.getElementById('window-btn');

        let currentDay = 1;
        let isHomeOccupied = false;
        let guestQueue = [];
        let currentGuest = null;
        let knockTimeout = null;

        let coins = 15;
        let hasIzlomProtection = false;

        let infectionStage = 0; 
        let isInfected = false;
        const STAGE_IMAGES = [
            'Gemini_Generated_Image_p3fnwnp3fnwnp3fn.png',
            'Gemini_Generated_Image_3d7oob3d7oob3d7o.png',
            'Gemini_Generated_Image_nb2seunb2seunb2s.png',
            'Gemini_Generated_Image_v0aowqv0aowqv0ao.png',
            'Gemini_Generated_Image_2r7fyc2r7fyc2r7f.png'
        ];

        const WINDOW_IMAGES = [
            'Gemini_Generated_Image_a6gnxta6gnxta6gn.png', 'Gemini_Generated_Image_sdf6f6sdf6f6sdf6.png',
            'Gemini_Generated_Image_3028yc3028yc3028.png', 'Gemini_Generated_Image_w64wjww64wjww64w.png',
            'Gemini_Generated_Image_z102hnz102hnz102.png', 'Gemini_Generated_Image_ybpzu5ybpzu5ybpz.png',
            'Gemini_Generated_Image_hzlwuihzlwuihzlw.png', 'Gemini_Generated_Image_hzrt4ahzrt4ahzrt.png',
            'Gemini_Generated_Image_hxdnc2hxdnc2hxdn.png', 'Gemini_Generated_Image_pdujm5pdujm5pduj.png',
            'Gemini_Generated_Image_vaz4mdvaz4mdvaz4.png', 'Gemini_Generated_Image_be7ocfbe7ocfbe7o.png'
        ];

        const GUESTS_DB = [
            { id: 'h_alko_knife', isMonster: false, imgBase: '1776946674946.png', text: '"Слышь, я тут это... хлебного демона завалил. Пустишь обсохнуть? Я свой, просто выпивший."', checks: [] },
            { id: 'h_hunter', isMonster: false, imgBase: '1776946852270.png', text: '"Я охотник на нечисть. В округе неспокойно, позволь остаться до рассвета, я обеспечу безопасность."', checks: [] },
            { id: 'm_fake_granny', isMonster: true, imgBase: '1776947101059.png', imgDeath: 'Gemini_Generated_Image_pz6kztpz6kztpz6k.png', text: '"Ой, милок... Живот прихватило, понос замучил... Пусти старую в туалет поскорее!"', checks: [] },
            { id: 'm_baby_woman', isMonster: true, imgBase: '1776676833370.png', imgDeath: 'Gemini_Generated_Image_pz6kztpz6kztpz6k.png', text: '"Помогите моей крошке... Нам некуда идти. Мы просто хотим спать..."', checks: [] },
            { id: 'h_mage', isMonster: false, imgBase: '1776676249565.png', text: '"Магия посоха укажет путь. Но сегодня мне нужно обычное тепло очага. Впустишь мага?"', checks: [] },
            { id: 'h_archer', isMonster: false, imgBase: '1776676127035.png', text: '"Стрелы на исходе, глаза устали. Дай передохнуть, я прикрою твой сон с луком в руках. Доверься хранителю времени."', checks: [] },
            { id: 'h_smoking_gnome', isMonster: false, imgBase: '1776675923780.png', text: '"*Кха-кха*... Есть огонька? Гному нужно перекурить эту бескончную ночь в безопасности."', checks: [] },
            { id: 'h_kpop_girl', isMonster: false, imgBase: '1776675721300.png', text: '"Привет! У меня в наушниках к-поп группа, но на улице стало слишком жутко. Можно к тебе?"', checks: [] },
            { id: 'h1', isMonster: false, imgBase: 'Gemini_Generated_Image_hs6fgkhs6fgkhs6f.png', imgHands: 'Gemini_Generated_Image_hej1oihej1oihej1.png', imgHat: 'Gemini_Generated_Image_dcsp14dcsp14dcsp.png', text: '"Впусти, я человек! Могу показать руки или снять шапку."', checks: ['hands', 'hat'] },
            { id: 'h_girl', isMonster: false, imgBase: '1776671697469.png', text: '"Пожалуйста, я боюсь... Там на улице кто-то ходит."', checks: [] },
            { id: 'h_gnome', isMonster: false, imgBase: '1776672616935.png', text: '"Я гном из пещер! Нам, маленьким, сейчас тяжелее всего. Пустишь?"', checks: [] },
            { id: 'h_old_no_teeth', isMonster: false, imgBase: '1776671492652.png', text: '"Зубов нет, кусаться нечем! Старый дед просит крова."', checks: [] },
            { id: 'h_buff', isMonster: false, imgBase: '1776671377057.png', text: '"Слышь, хозяин. Я крепкий парень, если Излом придет - вдвоем отмахаемся!"', checks: [] },
            { id: 'h_soldier', isMonster: false, imgBase: '1776637322788.png', text: '"Я военный при исполнении. Нужно переждать ночь. Монстра не подпущу к дому."', checks: [] },
            { id: 'h_guy', isMonster: false, imgBase: '1776636988431.png', text: '"Йоу, я свой! Видел Излома за углом, пусти скорее!"', checks: [] },
            { id: 'h_fat', isMonster: false, imgBase: '1776637562012.png', text: '"Ох, отдышаться бы... Пустишь толстяка на постой?"', checks: [] },
            { id: 'h_old_gl', isMonster: false, imgBase: 'Gemini_Generated_Image_mkjfs1mkjfs1mkjf.png', imgAlt: 'Gemini_Generated_Image_rhvnubrhvnubrhvn.png', text: '"Старый я... Могу очки снять, если подозрительно."', checks: ['glasses'] },
            { id: 'm_gl', isMonster: true, imgBase: 'Gemini_Generated_Image_zhviwwzhviwwzhvi.png', imgAlt: 'Gemini_Generated_Image_s1a9fts1a9fts1a9.png', imgDeath: 'Gemini_Generated_Image_pz6kztpz6kztpz6k.png', text: '"Глаза болят... Очки не сниму. Пустишь?"', checks: ['glasses'] },
            { id: 'm_granny1', isMonster: true, imgBase: '1776636123150.png', imgDeath: '1776636217836.png', text: '"Привет, Я к тебе пришел... Свежий батончик принес..."', checks: [] },
            { id: 'm_granny2', isMonster: true, imgBase: '1776636302683.png', imgDeath: '1776636708526.png', text: '"Открой, милок. Погода нынче не для прогулок..."', checks: [] },
            { id: 'm_creep', isMonster: true, imgBase: '1776636495908.png', imgDeath: '1776636852517.png', text: '"Эй... я тут это... зайти хотел. Покурим?"', checks: [] },
            { id: 'm_girl_demon', isMonster: true, imgBase: 'Gemini_Generated_Image_lx43k1lx43k1lx43.png', imgDeath: 'Gemini_Generated_Image_64bz6k64bz6k64bz.png', text: '"Помогите... мне холодно..."', checks: [] },
            { id: 'm_thin', isMonster: true, imgBase: '1776672891700.png', imgDeath: '1776636852517.png', text: '"П-п-пусти... Я... е-едва... г-говорю..."', checks: [] },
            { id: 'm_woman', isMonster: true, imgBase: '1776672510112.png', imgDeath: '1776636708526.png', text: '"Добрый вечер. Одинокой женщине найдется место?"', checks: [] }
        ];

        window.addEventListener('mousedown', () => {
            if (bgmMenu.paused && gameUI.classList.contains('hidden')) {
                bgmMenu.play().catch(() => {});
            }
        }, { once: true });

        function startIntro() {
            menu.classList.add('hidden');
            introContainer.style.display = 'block';
            bgmMenu.pause();
            introVideo.play();
            introVideo.onended = startGame;
        }

        function startGame() {
            introContainer.style.display = 'none';
            gameUI.classList.remove('hidden');
            bgmGame.play();
            initQueue();
            updateCoins(0);
            goToRoom();
        }

        function updateCoins(amount) {
            coins += amount;
            coinDisplay.innerText = coins;
        }

        function showShop() {
            portrait.style.backgroundImage = "url('1776946211243.png')";
            dialogueText.innerText = "Торговец в окне. Чего желаешь?";
            roomView.style.display = 'none';
            terminal.style.display = 'flex';
            optionsContainer.innerHTML = '';

            const b1 = document.createElement('button');
            b1.className = 'btn';
            b1.innerText = "ЗАЩИТА ОТ ИЗЛОМА (15)";
            b1.onclick = () => {
                if (coins >= 15) {
                    updateCoins(-15);
                    hasIzlomProtection = true;
                    alert("Защита куплена!");
                } else alert("Недостаточно монет!");
            };
            optionsContainer.appendChild(b1);

            const b2 = document.createElement('button');
            b2.className = 'btn';
            b2.innerText = "ЛЕКАРСТВО (20)";
            b2.onclick = () => {
                if (coins >= 20) {
                    updateCoins(-20);
                    infectionStage = 0;
                    isInfected = false;
                    alert("Мутация излечена!");
                } else alert("Недостаточно монет!");
            };
            optionsContainer.appendChild(b2);

            const bClose = document.createElement('button');
            bClose.className = 'btn border-red-500';
            bClose.innerText = "ВЫЙТИ";
            bClose.onclick = () => { terminal.style.display = 'none'; roomView.style.display = 'block'; };
            optionsContainer.appendChild(bClose);
        }

        function goToRoom() {
            terminal.style.display = 'none';
            roomView.style.display = 'block';
            eyeBtn.classList.add('hidden');
            
            if (currentDay % 5 === 0) {
                setTimeout(spawnLightMage, 3000);
            } else {
                knockTimeout = setTimeout(() => {
                    sfxKnock.play();
                    eyeBtn.classList.remove('hidden');
                }, 10000);
            }

            if (currentDay <= 12) {
                windowBtn.style.display = 'block';
            } else {
                windowBtn.style.display = 'none';
            }
        }

        function showMirror() {
            portrait.style.backgroundImage = `url('${STAGE_IMAGES[infectionStage]}')`;
            dialogueText.innerText = "Зеркало отражает твое состояние. " + (infectionStage > 0 ? "Вирус меняет тебя..." : "Ты выглядишь здоровым.");
            roomView.style.display = 'none';
            terminal.style.display = 'flex';
            optionsContainer.innerHTML = '';
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = "ОТОЙТИ";
            b.onclick = () => { terminal.style.display = 'none'; roomView.style.display = 'block'; };
            optionsContainer.appendChild(b);
        }

        function showWindow() {
            portrait.style.backgroundImage = `url('${WINDOW_IMAGES[currentDay-1]}')`;
            dialogueText.innerText = `Вид из окна на ${currentDay}-ю ночь.`;
            roomView.style.display = 'none';
            terminal.style.display = 'flex';
            optionsContainer.innerHTML = '';
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = "ОТОЙТИ";
            b.onclick = () => { terminal.style.display = 'none'; roomView.style.display = 'block'; };
            optionsContainer.appendChild(b);
        }

        function goToTerminal() {
            roomView.style.display = 'none';
            terminal.style.display = 'flex';
            spawnGuest();
        }

        function spawnLightMage() {
            roomView.style.display = 'none';
            terminal.style.display = 'flex';
            portrait.style.backgroundImage = "url('Gemini_Generated_Image_qrkzy6qrkzy6qrkz.png')";
            dialogueText.innerText = "Привет, я Маг Света, я пришел тебя проверить, заражен ты или нет. Покажи себя.";
            optionsContainer.innerHTML = '';
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = "ПОКАЗАТЬ СЕБЯ";
            b.onclick = () => {
                if (infectionStage >= 3) {
                    showDeath("Маг Света увидел в тебе монстра и испепелил святым огнем.", "Gemini_Generated_Image_qrkzy6qrkzy6qrkz.png");
                } else {
                    dialogueText.innerText = "Ты чист (или почти). Я ухожу, береги себя.";
                    optionsContainer.innerHTML = '';
                    const b2 = document.createElement('button');
                    b2.className = 'btn';
                    b2.innerText = "ДАЛЕЕ";
                    b2.onclick = nextDay;
                    optionsContainer.appendChild(b2);
                }
            };
            optionsContainer.appendChild(b);
        }

        function showDeath(reason, image) {
            gameUI.classList.add('hidden');
            deathScreen.classList.remove('hidden');
            deathScreen.style.backgroundImage = `url('${image}')`;
            document.getElementById('death-reason').innerText = reason;
            bgmGame.pause();
        }

        function initQueue() {
            guestQueue = [...GUESTS_DB].sort(() => Math.random() - 0.5);
        }

        function spawnGuest() {
            if (currentDay % 4 === 0) {
                checkIzlom();
                return;
            }
            if (guestQueue.length === 0) initQueue();
            currentGuest = guestQueue.pop();
            showStep(currentGuest.text, currentGuest.imgBase, getOptionsForGuest(currentGuest));
        }

        function getOptionsForGuest(guest) {
            let opts = [{ text: "ВПУСТИТЬ", action: "accept" }];
            if (guest.checks && guest.checks.includes('hands')) opts.push({ text: "РУКИ", action: "checkHands" });
            if (guest.checks && guest.checks.includes('hat')) opts.push({ text: "ШАПКА", action: "checkHat" });
            if (guest.checks && guest.checks.includes('glasses')) opts.push({ text: "ОЧКИ", action: "checkGlasses" });
            opts.push({ text: "ПРОГНАТЬ", action: "reject" });
            return opts;
        }

        function showStep(text, img, options) {
            dialogueText.innerText = text;
            portrait.style.backgroundImage = `url('${img}')`;
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = opt.text;
                b.onclick = () => handleAction(opt.action);
                optionsContainer.appendChild(b);
            });
        }

        function handleAction(action) {
            if (action === 'accept') {
                if (currentGuest.isMonster) {
                    showDeath("Монстр пробрался внутрь. Вы совершили фатальную ошибку.", currentGuest.imgDeath || 'Gemini_Generated_Image_pz6kztpz6kztpz6k.png');
                } else {
                    isHomeOccupied = true;
                    updateCoins(5);
                    updateStatus("ГОСТЬ ВНУТРИ", "text-blue-500");
                    // Заражение происходит ТОЛЬКО с шестой ночи
                    if (currentDay >= 6 && Math.random() < 0.2 && !isInfected) {
                        isInfected = true;
                    }
                    nextDay();
                }
            } else if (action === 'reject') {
                isHomeOccupied = false;
                updateStatus("ОДИНОЧЕСТВО", "text-green-600");
                nextDay();
            } else if (action.startsWith('check')) {
                let nextImg = currentGuest.imgBase;
                if (action === 'checkHands') nextImg = currentGuest.imgHands;
                if (action === 'checkHat') nextImg = currentGuest.imgHat;
                if (action === 'checkGlasses') nextImg = currentGuest.imgAlt;
                showStep("Ты все увидел? Теперь решай!", nextImg, [
                    { text: "ВПУСТИТЬ", action: "accept" },
                    { text: "ПРОГНАТЬ", action: "reject" }
                ]);
            }
        }

        function updateStatus(text, colorClass) {
            homeStatus.innerText = text;
            homeStatus.className = `${colorClass} font-black italic text-base uppercase`;
        }

        function nextDay() {
            currentDay++;
            dayDisplay.innerText = currentDay;
            // Развитие стадий вируса тоже происходит ТОЛЬКО с шестой ночи
            if (currentDay >= 6 && isInfected && infectionStage < 4) {
                infectionStage++;
            }
            optionsContainer.innerHTML = '<div class="text-gray-500 animate-pulse uppercase tracking-widest">Ожидание следующей фазы...</div>';
            setTimeout(goToRoom, 1000);
        }

        function checkIzlom() {
            dialogueText.innerText = "Четвертая ночь... Тень ложится на порог. Излом дёргает засов двери...";
            portrait.style.backgroundImage = "url('Gemini_Generated_Image_fge9kxfge9kxfge9.png')";
            optionsContainer.innerHTML = '<div class="text-red-700 font-black text-6xl animate-pulse tracking-tighter">ИЗЛОМ У ДВЕРИ</div>';
            
            setTimeout(() => {
                if (infectionStage >= 3) {
                    dialogueText.innerText = "Излом заглядывает в окно... и видит в тебе своего. Он издает хриплый смешок и уходит.";
                    updateStatus("ОНО УШЛО", "text-green-600");
                    finishIzlomPhase();
                } else if (isHomeOccupied) {
                    dialogueText.innerText = "Излом чувствует сопротивление. Двое в доме — слишком сложная добыча. Он уходит в темноту.";
                    isHomeOccupied = false;
                    updateStatus("ОДИНОЧЕСТВО", "text-green-600");
                    finishIzlomPhase();
                } else if (hasIzlomProtection) {
                    dialogueText.innerText = "Излом пытается открыть дверь, но твоя защита отпугивает его. Он уходит прочь.";
                    hasIzlomProtection = false;
                    updateStatus("ЗАЩИТА СРАБОТАЛА", "text-yellow-600");
                    finishIzlomPhase();
                } else {
                    showDeath("Излом зашел в тихий дом. Твой крик захлебнулся в ночной тишине.", "1771547396165.png");
                }
            }, 4000);
        }

        function finishIzlomPhase() {
            const b = document.createElement('button');
            b.className = 'btn border-green-700 text-green-500';
            b.innerText = "ВСТРЕТИТЬ РАССВЕТ";
            b.onclick = nextDay;
            optionsContainer.innerHTML = '';
            optionsContainer.appendChild(b);
        }
    </script>
</body>
</html>
